name: Quarto Publish (uten renv)

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.2'
          use-public-rspm: true

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libudunits2-dev libproj-dev libgdal-dev \
            libfontconfig1-dev libfreetype6-dev \
            libharfbuzz-dev libfribidi-dev pkg-config

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-pkgs-v1
          restore-keys: r-pkgs-

            - name: Install R packages
        run: |
          install.packages(c(
            "tidyverse", "ggplot2", "plotly", "leaflet",
            "leaflet.extras", "leaflet.extras2", "leafem",
            "mapview", "leafpop", "sf", "giscoR", "csmaps",
            "reactable", "gt", "ggiraph", "crosstalk",
            "PxWebApiData", "janitor", "here", "eurostat",
            "bslib", "htmlwidgets", "shiny", "httr2",
            "hrbrthemes", "viridis", "scales", "RColorBrewer",
            "ggsci"
          ))
        shell: Rscript {0}

      - name: Render & Publish
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
